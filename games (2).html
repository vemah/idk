<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0a0a12;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 18, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(124, 110, 247, 0.15);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #7c6ef7;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      text-decoration: none;
      color: #a0a0b0;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #ffffff;
    }

    .hero {
      position: relative;
      z-index: 1;
      padding: 5rem 2rem 4rem;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.75rem;
      text-shadow: 0 0 40px rgba(124, 110, 247, 0.4);
      letter-spacing: -1px;
    }

    .hero p {
      color: #a0a0b0;
      font-size: 1.1rem;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    #games {
      width: 100%;
      min-height: 400px;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      color: #555568;
      font-size: 0.85rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; }
      nav { gap: 1rem; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <header>
    <div class="logo">Chud<span>Hub</span></div>
    <nav>
      <a href="#">hope</a>
      <a href="#">top</a>
      <a href="#">new</a>
    </nav>
  </header>

  <div class="hero">
    <h1>games to browse</h1>
    <p>play your favorite games or not idc</p>
  </div>

  <main>
    <div id="games"></div>
  </main>

  <footer>
    &copy; 2067 real copyright peyton is cool i like penis letssss get itttt yuhhhh
  </footer>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    let width, height, particles;
    const PARTICLE_COUNT = 120;
    const CONNECT_DIST = 140;
    const MOUSE_REPEL = 120;

    const mouse = { x: -9999, y: -9999 };

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    function randomBetween(a, b) {
      return a + Math.random() * (b - a);
    }

    function createParticle() {
      const colors = ['#7c6ef7', '#5b8af7', '#a855f7', '#6ee7f7', '#f757a8'];
      return {
        x: randomBetween(0, width),
        y: randomBetween(0, height),
        vx: randomBetween(-0.3, 0.3),
        vy: randomBetween(-0.3, 0.3),
        radius: randomBetween(1.5, 3),
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: randomBetween(0.4, 0.9),
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: PARTICLE_COUNT }, createParticle);
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        const dx = mouse.x - p.x;
        const dy = mouse.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < MOUSE_REPEL) {
          const force = (MOUSE_REPEL - dist) / MOUSE_REPEL;
          p.vx -= (dx / dist) * force * 0.6;
          p.vy -= (dy / dist) * force * 0.6;
        }

        p.vx *= 0.98;
        p.vy *= 0.98;

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i];
          const b = particles[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECT_DIST) {
            const opacity = (1 - dist / CONNECT_DIST) * 0.25;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(124, 110, 247, ${opacity})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);

    init();
    draw();
  </script>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark',
      onReady: () => console.log('LuminSDK is ready'),
      onError: (err) => console.error('LuminSDK error:', err),
    });
  </script>

</body>
</html>
